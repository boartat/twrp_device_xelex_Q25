name: Build OrangeFox (Q25)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: "OrangeFox manifest branch"
        default: "12.1"
        required: true
      BUILD_TARGET:
        description: "make target"
        default: "vendorbootimage"
        required: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Show free space
        run: df -h /

      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device_tree

      - name: Install build packages
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf imagemagick \
            lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool \
            libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libwxgtk3.0-gtk3-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev python3 python-is-python3 openjdk-11-jdk repo

      - name: Set up git identity
        run: |
          git config --global user.name "ofox-ci"
          git config --global user.email "ofox-ci@users.noreply.github.com"
          git config --global trailer.ifexists addIfDifferent

      - name: Sync OrangeFox sources
        run: |
          git clone https://gitlab.com/OrangeFox/sync.git ofsync
          cd ofsync
          ./orangefox_sync.sh --branch ${{ github.event.inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/fox

      - name: Place device tree
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/fox/device/xelex/Q25
          rsync -a --exclude='.git' --exclude='.github' device_tree/ ${GITHUB_WORKSPACE}/fox/device/xelex/Q25/
          ls -la ${GITHUB_WORKSPACE}/fox/device/xelex/Q25/

      - name: Force recovery theme to portrait_hdpi
        # The soong twrpVarsPlugin namespace comes up empty on this build, so the
        # theme selector returns "" -> "TW_THEME: not set". OF only ships
        # portrait_hdpi and this is a 720x720 square device, so hard-pin the
        # selector's fallback return value to portrait_hdpi.
        run: |
          F=$(find ${GITHUB_WORKSPACE}/fox/bootable/recovery -name 'libguitwrp_defaults.go' | head -1)
          echo "theme file: $F"
          if [ -n "$F" ]; then
            sed -i 's|return getMakeVars(ctx, "TW_THEME")|return "portrait_hdpi"|' "$F"
            echo "=== verify ==="; grep -n 'return "portrait_hdpi"' "$F" || echo "PATCH DID NOT APPLY"
          else
            echo "ERROR: libguitwrp_defaults.go not found"; exit 1
          fi

      - name: Build
        # Explicit args drop GitHub's default -e. envsetup/lunch legitimately return
        # non-zero many times; -e would kill the build. pipefail is set in-script so
        # the final exit reflects mka's status, not tee's.
        shell: bash --noprofile --norc {0}
        run: |
          set +e
          set -o pipefail
          cd ${GITHUB_WORKSPACE}/fox
          export ALLOW_MISSING_DEPENDENCIES=true
          export LC_ALL=C
          export FOX_BUILD_DEVICE=Q25
          source build/envsetup.sh
          lunch twrp_Q25-eng 2>&1 | tee ${GITHUB_WORKSPACE}/build.log
          mka ${{ github.event.inputs.BUILD_TARGET }} 2>&1 | tee -a ${GITHUB_WORKSPACE}/build.log
          exit ${PIPESTATUS[0]}

      - name: Error summary
        if: failure()
        run: |
          echo "================= grep'd errors ================="
          grep -nE "error:|FAILED:|ninja: build stopped|fatal error|No rule to make|don't know how to make|Nothing to be done|cannot find|not found|Stop\.|\*\*\*" ${GITHUB_WORKSPACE}/build.log | tail -100 || true
          echo "================= last 150 lines ================="
          tail -150 ${GITHUB_WORKSPACE}/build.log || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/artifacts
          cp -v ${GITHUB_WORKSPACE}/fox/out/target/product/Q25/vendor_boot.img ${GITHUB_WORKSPACE}/artifacts/ 2>/dev/null || true
          cp -v ${GITHUB_WORKSPACE}/fox/out/target/product/Q25/OrangeFox*.zip ${GITHUB_WORKSPACE}/artifacts/ 2>/dev/null || true
          cp -v ${GITHUB_WORKSPACE}/fox/out/target/product/Q25/recovery.img ${GITHUB_WORKSPACE}/artifacts/ 2>/dev/null || true
          ls -la ${GITHUB_WORKSPACE}/artifacts/ || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Q25
          path: artifacts/*
          if-no-files-found: warn
