name: Build TWRP-14.1 (Q25)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: "TWRP minimal-manifest branch"
        default: "twrp-14.1"
        required: true
      BUILD_TARGET:
        description: "mka target(s)"
        default: "adbd recoveryimage vendorbootimage"
        required: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          # KEEP swap: build #24 died at exit 143 (SIGTERM) right at the soong
          # bootstrap->analysis transition with 119GB disk still free -> not disk, almost
          # certainly OOM. We don't need the ~4GB that removing swap reclaims, and the
          # swap gives soong_build memory headroom. So do NOT reclaim swap.
          swap-storage: false

      - name: Show free space
        run: df -h /

      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device_tree

      - name: Install build packages
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf imagemagick \
            lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool \
            libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev python3 python-is-python3 repo

      - name: Set up git identity
        run: |
          git config --global user.name "twrp-ci"
          git config --global user.email "twrp-ci@users.noreply.github.com"
          git config --global trailer.ifexists addIfDifferent
          git config --global advice.detachedHead false

      - name: Sync TWRP minimal sources
        # TWRP minimal manifest (NOT OrangeFox — OF has no A14 base). twrp-14.1 = AOSP 14
        # userspace (init/recovery/sepolicy), which our inverse-merge pre-test proved boots
        # on this device's android12 GKI kernel (A16 LOS init booted; A14 is close).
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/twrp
          cd ${GITHUB_WORKSPACE}/twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b ${{ github.event.inputs.MANIFEST_BRANCH }}
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
          echo "=== sanity: key trees present ==="
          for d in build/make bootable/recovery vendor/twrp system/core; do
            test -d $d && echo "  OK  $d" || echo "  MISSING $d"
          done

      - name: Place device tree
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/twrp/device/xelex/Q25
          rsync -a --exclude='.git' --exclude='.github' device_tree/ ${GITHUB_WORKSPACE}/twrp/device/xelex/Q25/
          ls -la ${GITHUB_WORKSPACE}/twrp/device/xelex/Q25/

      - name: Force recovery theme to portrait_hdpi (non-fatal)
        # 720x720 SQUARE panel: the auto theme selector maps it to a DPI TWRP doesn't ship.
        # device.mk already pins TW_THEME=portrait_hdpi via the twrpVarsPlugin soong
        # namespace; this sed is a belt-and-suspenders fallback on determineTheme. Do NOT
        # fail the build if the source layout differs on twrp-14.1 — just warn.
        run: |
          F=$(find ${GITHUB_WORKSPACE}/twrp/bootable/recovery -name 'libguitwrp_defaults.go' 2>/dev/null | head -1)
          echo "theme file: ${F:-<not found>}"
          if [ -n "$F" ]; then
            sed -i 's|return getMakeVars(ctx, "TW_THEME")|return "portrait_hdpi"|' "$F" || true
            grep -n 'return "portrait_hdpi"' "$F" && echo "theme patch applied" || echo "WARN: theme sed did not match (relying on device.mk soong var)"
          else
            echo "WARN: libguitwrp_defaults.go not found — relying on device.mk soong var"
          fi

      - name: Build
        shell: bash --noprofile --norc {0}
        run: |
          set +e
          set -o pipefail
          cd ${GITHUB_WORKSPACE}/twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          export LC_ALL=C
          source build/envsetup.sh
          : > ${GITHUB_WORKSPACE}/build.log
          # CRITICAL: lunch must NOT be piped — a pipe runs it in a subshell and the
          # exported TARGET_PRODUCT/DEVICE never reach mka (silent fallback to generic).
          # AOSP 14 lunch combo is 3-part: <product>-<release>-<variant>. The release
          # codename for twrp-14.1 is ap2a (build errored: "release is one of: ap2a").
          lunch twrp_Q25-ap2a-eng
          echo "(lunch: TARGET_PRODUCT=$TARGET_PRODUCT TARGET_DEVICE=$TARGET_DEVICE)" | tee -a ${GITHUB_WORKSPACE}/build.log
          echo "================= resolved build vars =================" | tee -a ${GITHUB_WORKSPACE}/build.log
          for v in TARGET_PRODUCT TARGET_DEVICE PRODUCT_OUT PLATFORM_VERSION BOARD_BOOT_HEADER_VERSION \
                   BOARD_VENDOR_BOOTIMAGE_PARTITION_SIZE INSTALLED_VENDOR_BOOTIMAGE_TARGET \
                   BOARD_MOVE_RECOVERY_RESOURCES_TO_VENDOR_BOOT TARGET_NO_RECOVERY \
                   BOARD_INCLUDE_RECOVERY_RAMDISK_IN_VENDOR_BOOT DEVICE_PATH; do
            echo "  $v = $(get_build_var $v 2>/dev/null)" | tee -a ${GITHUB_WORKSPACE}/build.log
          done
          mka ${{ github.event.inputs.BUILD_TARGET }} 2>&1 | tee -a ${GITHUB_WORKSPACE}/build.log
          echo "================= images produced =================" | tee -a ${GITHUB_WORKSPACE}/build.log
          find out/target/product -name '*.img' -printf '%12s  %p\n' 2>/dev/null | tee -a ${GITHUB_WORKSPACE}/build.log
          if find out/target/product -name 'vendor_boot.img' | grep -q .; then
            echo "OK: vendor_boot image present" | tee -a ${GITHUB_WORKSPACE}/build.log; exit 0
          else
            echo "FAIL: no vendor_boot image produced" | tee -a ${GITHUB_WORKSPACE}/build.log; exit 1
          fi

      - name: Error summary
        if: failure()
        run: |
          echo "================= grep'd errors ================="
          grep -nE "error:|FAILED:|ninja: build stopped|fatal error|No rule to make|don't know how to make|Nothing to be done|cannot find|not found|Stop\.|\*\*\*" ${GITHUB_WORKSPACE}/build.log | tail -120 || true
          echo "================= last 200 lines ================="
          tail -200 ${GITHUB_WORKSPACE}/build.log || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/artifacts
          cd ${GITHUB_WORKSPACE}/twrp
          find out/target/product -type f \( -name 'vendor_boot.img' -o -name 'recovery.img' -o -name 'boot.img' \) -exec cp -v {} ${GITHUB_WORKSPACE}/artifacts/ \; 2>/dev/null || true
          ls -la ${GITHUB_WORKSPACE}/artifacts/ || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Q25
          path: artifacts/*
          if-no-files-found: warn
